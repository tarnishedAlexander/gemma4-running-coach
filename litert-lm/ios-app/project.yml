name: GemmaCoach
options:
  bundleIdPrefix: com.gemma4.runningcoach
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  CoreMLLLM:
    url: https://github.com/john-rocky/CoreML-LLM.git
    from: "1.9.0"

targets:
  GemmaCoach:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: GemmaCoach
        excludes:
          - "Info.plist"
          - "GemmaCoach.entitlements"
    resources:
      - path: GemmaCoach/Assets.xcassets
      - path: GemmaCoach/Preview Content
    info:
      path: GemmaCoach/Info.plist
      properties:
        CFBundleDisplayName: GemmaCoach
        UILaunchScreen:
          UIColorName: AccentColor
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSPhotoLibraryUsageDescription: Pick a photo to ask Gemma 4 about.
        NSMicrophoneUsageDescription: Record voice prompts for Gemma 4 coaching.
    entitlements:
      path: GemmaCoach/GemmaCoach.entitlements
      properties:
        com.apple.developer.kernel.increased-memory-limit: true
    settings:
      base:
        PRODUCT_NAME: GemmaCoach
        PRODUCT_BUNDLE_IDENTIFIER: com.gemma4.runningcoach.GemmaCoach
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        SWIFT_OBJC_BRIDGING_HEADER: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_ASSET_PATHS: '"GemmaCoach/Preview Content"'
    dependencies:
      - package: CoreMLLLM
        product: CoreMLLLM
